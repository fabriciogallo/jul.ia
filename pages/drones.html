<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JUL.IA | Drones</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Exo+2:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="shortcut icon"
      href="../assets/images/img-favicon-jul-ia.png"
      type="image/x-icon"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="../assets/styles/drones.css" />
  </head>

  <body>
    <!-- TOPBAR -->
    <header class="topbar">
      <div class="topbar-logo">
        <img
          src="../assets/images/img-logo-jul-ia.png"
          alt="JUL.IA"
          class="logo-jul-ia"
        />
      </div>
      <div class="topbar-title">Drones</div>
      <div class="topbar-right">
        <i class="bi bi-bell"></i>
        <div class="avatar">
          <img src="../assets/images/img-astronauta-user.png" alt="Avatar" />
        </div>
      </div>
    </header>

    <div class="main-wrapper">
      <nav class="sidebar">
        <a class="nav-icon" href="../pages/menu.html" aria-label="Menu"
          ><i class="bi bi-list"></i
        ></a>
        <a class="nav-icon" href="../index.html" aria-label="Dashboard"
          ><i class="bi bi-grid-1x2"></i
        ></a>
        <a class="nav-icon" href="../pages/energia.html" aria-label="Energia"
          ><i class="bi bi-lightning"></i
        ></a>
        <a class="nav-icon" href="../pages/estufa.html" aria-label="Estufa">
          <img
            src="../assets/images/apple-light.svg"
            width="18"
            height="20"
            alt="Icone Maçã"
          />
        </a>
        <a class="nav-icon" href="../pages/agua.html" aria-label="Água"
          ><i class="bi bi-droplet"></i
        ></a>
        <a class="nav-icon" href="../pages/ar.html" aria-label="Ar"
          ><i class="bi bi-wind"></i
        ></a>
        <a class="nav-icon" href="../pages/estoque.html" aria-label="Estoque"
          ><i class="bi bi-boxes"></i>
        </a>
        <a class="nav-icon" href="../pages/colonia.html" aria-label="Colônia"
          ><img
            src="../assets/images/icon-domo.png"
            height="14"
            alt="Icone Domo"
          />
        </a>
        <a class="nav-icon" href="../pages/astronautas.html" aria-label="Perfil"
          ><i class="bi bi-person-circle"></i
        ></a>
        <a
          class="nav-icon active"
          href="../pages/drones.html"
          aria-label="Drones"
          ><img
            src="../assets/images/icon-drone-ativo.png"
            height="16"
            alt="Icone Domo"
          />
        </a>
        <a class="nav-icon" href="../pages/ajuda.html" aria-label="Ajuda"
          ><i class="bi bi-question-circle"></i
        ></a>
        <div class="spacer"></div>

        <a
          class="nav-icon"
          href="../pages/config.html"
          aria-label="Configurações"
          ><i class="bi bi-gear"></i
        ></a>
      </nav>

      <!-- CONTEÚDO PRINCIPAL -->
      <main class="content-area">
        <!-- ══ LINHA 1: 4 thumbnails de câmera ══ -->
        <div class="thumbs-row">
          <div class="thumb-card active-thumb" data-drone="DRONE-KX-21">
            <video
              class="thumb-video"
              src="../assets/images/video-drone-kx-21.mov"
              autoplay
              loop
              muted
              playsinline
              poster="../assets/images/drone-kx21-poster.jpg"
            ></video>
            <div class="thumb-label">
              <i class="bi bi-cpu-fill"></i>
              DRONE-KX-21
            </div>
          </div>

          <div class="thumb-card" data-drone="DRONE-LS-52">
            <video
              class="thumb-video"
              src="../assets/images/video-drone-ls-52.mp4"
              autoplay
              loop
              muted
              playsinline
              poster="../assets/images/drone-ls52-poster.jpg"
            ></video>
            <div class="thumb-label">
              <i class="bi bi-cpu-fill"></i>
              DRONE-LS-52
            </div>
          </div>

          <div class="thumb-card" data-drone="DRONE-DJI-124">
            <video
              class="thumb-video"
              src="../assets/images/video-drone-dji-124.mp4"
              autoplay
              loop
              muted
              playsinline
              poster="../assets/images/drone-dji124-poster.jpg"
            ></video>
            <div class="thumb-label">
              <i class="bi bi-cpu-fill"></i>
              DRONE-DJI-124
            </div>
          </div>

          <div class="thumb-card" data-drone="DRONE-CQQ-008">
            <video
              class="thumb-video"
              src="../assets/images/video-drone-cqq-008.mp4"
              autoplay
              loop
              muted
              playsinline
              poster="../assets/images/drone-cqq008-poster.jpg"
            ></video>
            <div class="thumb-label">
              <i class="bi bi-cpu-fill"></i>
              DRONE-CQQ-008
            </div>
          </div>
        </div>
        <!-- /thumbs-row -->

        <!-- ══ LINHA 2: feed principal + painel lista ══ -->
        <div class="feed-row">
          <!-- FEED PRINCIPAL com crosshair -->
          <div class="main-feed">
            <video
              class="main-video"
              src="../assets/images/video-drone-sz-67.mov"
              autoplay
              loop
              muted
              playsinline
              poster="../assets/images/drone-sz67-poster.jpg"
              aria-label="Feed principal do drone DRONE-SZ-67"
            ></video>

            <!-- Crosshair / mira de câmera -->
            <div class="crosshair" aria-hidden="true">
              <!-- cantos superiores -->
              <span class="ch ch-tl"></span>
              <span class="ch ch-tr"></span>
              <!-- cantos inferiores -->
              <span class="ch ch-bl"></span>
              <span class="ch ch-br"></span>
              <!-- linha vertical central -->
              <span class="ch ch-vc"></span>
            </div>

            <!-- Label do drone no canto inferior esquerdo -->
            <div class="feed-label">
              <i class="bi bi-cpu-fill"></i>
              DRONE-SZ-67
            </div>
          </div>
          <!-- /main-feed -->

          <!-- PAINEL LISTA DE DRONES -->
          <div class="drones-panel">
            <div class="card-label"><i class="bi bi-cpu-fill"></i> Drones</div>

            <div class="drone-list">
              <div class="drone-item">
                <div class="drone-item-left">
                  <i class="bi bi-cpu-fill drone-icon"></i>
                  <span class="drone-id">DRONE-KX-21</span>
                </div>
                <div class="drone-item-right">
                  <i class="bi bi-battery-full drone-bat-icon"></i>
                  <span class="drone-bat">98%</span>
                </div>
              </div>

              <div class="drone-item">
                <div class="drone-item-left">
                  <i class="bi bi-cpu-fill drone-icon"></i>
                  <span class="drone-id">DRONE-LS-52</span>
                </div>
                <div class="drone-item-right">
                  <i class="bi bi-battery-full drone-bat-icon"></i>
                  <span class="drone-bat">98%</span>
                </div>
              </div>

              <div class="drone-item">
                <div class="drone-item-left">
                  <i class="bi bi-cpu-fill drone-icon"></i>
                  <span class="drone-id">DRONE-DJI-124</span>
                </div>
                <div class="drone-item-right">
                  <i class="bi bi-battery-full drone-bat-icon"></i>
                  <span class="drone-bat">98%</span>
                </div>
              </div>

              <div class="drone-item">
                <div class="drone-item-left">
                  <i class="bi bi-cpu-fill drone-icon"></i>
                  <span class="drone-id">DRONE-CQQ-008</span>
                </div>
                <div class="drone-item-right">
                  <i class="bi bi-battery-full drone-bat-icon"></i>
                  <span class="drone-bat">98%</span>
                </div>
              </div>

              <div class="drone-item">
                <div class="drone-item-left">
                  <i class="bi bi-cpu-fill drone-icon"></i>
                  <span class="drone-id">DRONE-SZ-67</span>
                </div>
                <div class="drone-item-right">
                  <i class="bi bi-battery-full drone-bat-icon"></i>
                  <span class="drone-bat">98%</span>
                </div>
              </div>
            </div>
            <!-- /drone-list -->
          </div>
          <!-- /drones-panel -->
        </div>
        <!-- /feed-row -->
      </main>
    </div>
    <!-- /main-wrapper -->

    <!-- STATUS BAR -->
    <footer class="statusbar">
      <div class="statusbar-item">
        SISTEMA CENTRAL: <span class="val-green">ATIVO</span>
      </div>
      <div class="statusbar-item" style="margin-left: auto">
        REDE: <span class="val-white">ESTÁVEL</span>
      </div>
      <div class="statusbar-item">SAT: <span class="val-blue">14MS</span></div>
      <div class="statusbar-item">
        LOCAL: <span class="val-white">SINCRONIZADO</span>
      </div>
    </footer>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      crossorigin="anonymous"
    ></script>

    <script>
      // Clicar num thumbnail troca o feed principal
      document.querySelectorAll(".thumb-card").forEach((card) => {
        card.addEventListener("click", () => {
          // remove active de todos
          document
            .querySelectorAll(".thumb-card")
            .forEach((c) => c.classList.remove("active-thumb"));
          card.classList.add("active-thumb");

          const droneId = card.dataset.drone;
          const mainVideo = document.querySelector(".main-video");
          const feedLabel = document.querySelector(".feed-label");
          const thumbVideo = card.querySelector(".thumb-video");

          // troca src e poster do feed principal
          if (thumbVideo) {
            mainVideo.src = thumbVideo.src;
            mainVideo.poster = thumbVideo.poster || "";
            mainVideo.load();
            mainVideo.play().catch(() => {});
          }
          feedLabel.innerHTML = `<i class="bi bi-cpu-fill"></i> ${droneId}`;
        });
      });
    </script>
  </body>
</html>
